spring:
  application:
    name: pitsafety
  datasource:
    url: jdbc:mysql://localhost:3306/pit_safety_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 12345678
